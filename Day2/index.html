<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day2 of the challenge</title>
</head>
<body>
    <header>
        <h1>Heading 1</h1>          <!--Heading must be meaningful-->
        <h2>Heading 2</h2>          <!--Never use Heading just to make your text big-->
        <h3>Heading 3</h3>          <!--One heading per Page is considered as the best practise-->
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#links">link</a>
    </nav>

    <section>
        <p>paragraph</p>   <!--Keep paragraph short -> Min 2-4 sentence max , One Idea per paragraph-->
    </section>

    <section id="home">
        <strong>Strong Tag</strong>         <!--Strong tag is used for Important Text-->
        <em>Emphasized text</em>            <!--Emphasis text like the tag that is used for special attention,importance or focus-->
    </section>

    <section id="about">   <!--Replace break tag by paragraph tag-->
        <p>Hello This is</p>    <!--According to the code practise this way is considered as the good practise-->
        
        <p>Soyuz</p>            <!--Don't stack <br /> unless it is needed like poem etc-->
    </section>

    <section id="link">
        <a href="https://github.com/SoyuzDangol55">Visit github profile</a>         <!--Basic Link-->
        <a href="https://www.youtube.com/watch?v=fuWq4RZnc6U&list=RDfuWq4RZnc6U&start_radio=1" target="_blank" rel="noopener">Visit Song</a>        <!--Redirects to Link included into new Tab-->
    </section>

    <section>
        <img src="images/logo.png" alt="Image that shows logo of graph"/> <!--Image should be imformative Like it should be random thing that helps decorate your page -->
    </section>

</body>
</html>
