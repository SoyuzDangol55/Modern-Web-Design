<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-14 of Vibe code Session</title>
</head>

<body>
    <header>
        <h1>JavaScript Events: Responding
            to User Actions</h1>
    </header>

    <section>
        <label for="Name">Name</label>
        <input type="text" id="name" placeholder="Name">
        <label for="Email" id="Email">Email</label>
        <input type="text" id="Email" placeholder="Email">
        <button id="btn">Click1</button>
        <button id="btn2">Click2</button>

        <p id="message">Nothing have Happened</p>
    </section>

    <footer>
        <h5>All Rights Reserved by Soyuz</h5>
    </footer>

    <script>
        const button = document.getElementById('btn');
        const button2 = document.getElementById('btn2');
        var msg = document.getElementById('message');

        button.addEventListener('click', function () {
           msg.textContent= "First button clicked";
        });


        //Understand Event Handlers
        function handleClick(){
            msg.textContent = "Second button clicked";
        }
        button2.addEventListener('click',handleClick);

    </script>

</body>

</html>
