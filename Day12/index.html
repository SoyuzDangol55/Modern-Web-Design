<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-12 of the vibe code session</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Buttons,Forms & User Interaction Design</h1>
    </header>
    <!--Button vs Links
    Use a Link When:
    •  Navigating to another page
    •  Opening external content
    
    Use a Button When:
    •  Triggering an action
    •  Submitting a form
    •  Performing an interaction
    -->
    <section>
        <a href="https://wallpaperaccess.com/full/8986294.jpg">Click me</a>

        <button>Submit</button>
    </section>

    <form>
        <button type="submit">Send</button>
    </form>

</body>
</html>
